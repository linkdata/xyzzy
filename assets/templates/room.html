{{define "room.html"}}
<!doctype html>
<html lang="en">
<head>{{template "head.html" $}}</head>
<body>
<div id="jaws-alerts" class="position-fixed top-0 start-50 translate-middle-x mt-5 pt-2" style="z-index:1060;min-width:320px"></div>
<form autocomplete="off">
  <nav class="navbar navbar-dark bg-dark fixed-top px-3">
    <a class="navbar-brand fw-bold" href="/">Pretend You're Xyzzy</a>
    <span class="text-light btn btn-outline-light btn-sm disabled">{{$.Dot.Nickname}}</span>
  </nav>
  <div class="container-fluid" style="margin-top:4.5rem">
    {{if $.Dot.Alert}}
    <div class="alert alert-warning alert-dismissible mb-3" role="alert">
      {{$.Dot.Alert}}
    </div>
    {{end}}
    <div class="row g-3">
      <div class="col-md-3">
        {{$.Container "sidebar" $.Dot.Sidebar}}
      </div>
      <div class="col-md-9">
        {{$.Container "main" $.Dot.Main}}
      </div>
    </div>
  </div>
  {{$.TailHTML}}
</form>
</body>
</html>
{{end}}
