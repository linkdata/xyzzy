{{define "index.html"}}
<!doctype html>
<html lang="en">
<head>{{template "head.html" $}}</head>
<body>
<div id="jaws-alerts" class="position-fixed start-50 translate-middle-x" style="top:4rem;z-index:1060;min-width:320px"></div>
<form autocomplete="off">
  <nav class="navbar navbar-dark bg-dark fixed-top px-3">
    <a class="navbar-brand fw-bold" href="/">Pretend You're Xyzzy</a>
    <a href="#nickname-section" class="btn btn-outline-light btn-sm">{{$.Dot.Nickname}}</a>
  </nav>
  <div class="container-fluid" style="margin-top:4.5rem">
    <div class="row g-3">
      <div class="col-md-3">
        {{$.Container "div" (lobbySidebar $.Dot)}}
      </div>
      <div class="col-md-9">
        {{$.Container "div" (lobbyMain $.Dot)}}
      </div>
    </div>
  </div>
  {{$.TailHTML}}
</form>
</body>
</html>
{{end}}
