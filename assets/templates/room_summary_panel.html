{{with .Dot}}
<div id="{{$.Jid}}">
  <div class="d-flex justify-content-between align-items-center mb-2">
    <div class="fw-bold font-monospace">{{.Room.Code}}</div>
    <span class="badge {{.StateBadgeClass}}">
      {{.Room.State}}
    </span>
  </div>

  <div class="d-grid mb-3">
    <a class="btn btn-outline-danger btn-sm" href="/">Lobby</a>
  </div>

  <div class="list-group list-group-flush">
    {{range .Room.Players}}
    <div class="list-group-item px-0 d-flex justify-content-between align-items-center{{if $.Dot.IsRoundWinner .}} list-group-item-warning room-player-winner{{end}}">
      <span>
        {{.Nickname}}
        {{if $.Dot.PlayerHost .}}<span class="badge bg-secondary ms-1">host</span>{{end}}
        {{if $.Dot.PlayerJudge .}}<span class="badge bg-warning text-dark ms-1">czar</span>{{end}}
        {{if $.Dot.IsRoundWinner .}}<span class="badge bg-warning text-dark ms-1">winner</span>{{end}}
        {{if $.Dot.PlayerSubmitted .}}<span class="badge bg-success ms-1">✓</span>{{end}}
      </span>
      <span class="badge bg-primary rounded-pill">{{$.Dot.PlayerScore .}}</span>
    </div>
    {{end}}
  </div>
</div>
{{end}}
