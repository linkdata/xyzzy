{{with .Dot}}
<div id="{{$.Jid}}">
  <div class="d-grid mb-3">
    <a href="/create-room" class="btn btn-primary">Create Room</a>
  </div>
  {{if .PublicRooms}}
  <div class="list-group">
    {{range .PublicRooms}}
    <a href="/room/{{.Code}}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
      <span>
        <span class="fw-semibold font-monospace">{{.Code}}</span>
        <small class="text-muted ms-2">{{.HostName}}</small>
      </span>
      <span class="badge bg-secondary rounded-pill">{{.PlayerCount}}</span>
    </a>
    {{end}}
  </div>
  {{else}}
  <p class="text-muted small">No rooms yet — create one above.</p>
  {{end}}
</div>
{{end}}
