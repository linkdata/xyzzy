{{define "lobby_actions_panel.html"}}
{{with .Dot}}
<section id="{{$.Jid}}" class="panel action-panel">
  <p class="eyebrow">Quick Start</p>
  <h2>Spin up a table or jump into one</h2>
  <div class="stack gap-md">
    <div class="action-row">
      {{$.Button .Page.CreateRoomAction `class="button button-primary"`}}
    </div>
    <label class="field">
      <span>Room code</span>
      {{$.Text .Page.JoinCodeField `class="text-input code-input" placeholder="ABC123"`}}
    </label>
    <div class="action-row">
      {{$.Button .Page.JoinRoomAction `class="button button-secondary"`}}
    </div>
  </div>
</section>
{{end}}
{{end}}
